name: Deploy Notes to GitHub Pages
run-name: >-
  Deploy Pages
  ${{ github.event_name == 'workflow_dispatch' && format(' (manual: {0})', inputs.deploy_reason || 'no note') || '' }}

on:
  workflow_dispatch:
    inputs:
      deploy_reason:
        description: Optional note for this Pages deploy
        required: false
        type: string
  push:
    branches:
      - master
    paths:
      - version.json

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Cache Quartz plugins
        uses: actions/cache@v4
        with:
          path: site/.quartz/plugins
          key: ${{ runner.os }}-quartz-plugins-${{ hashFiles('site/quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-quartz-plugins-

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build Quartz site
        working-directory: site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
